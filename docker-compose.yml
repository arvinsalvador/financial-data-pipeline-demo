services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financial_pipeline}
      POSTGRES_USER: ${POSTGRES_USER:-pipeline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pipeline_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: ${APP_NAME:-CFO Financial Data Pipeline Demo}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-pipeline}:${POSTGRES_PASSWORD:-pipeline_dev_password}@postgres:5432/${POSTGRES_DB:-financial_pipeline}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      UPLOAD_TEMP_DIRECTORY: /data/raw/uploads
      REGISTERED_RAW_DIRECTORY: /data/raw/registered
      REJECTED_RAW_DIRECTORY: /data/raw/rejected
      MANIFESTS_DIRECTORY: /data/manifests
      ALLOWED_SOURCE_FILE_EXTENSIONS: ${ALLOWED_SOURCE_FILE_EXTENSIONS:-.csv}
      ALLOWED_SOURCE_FILE_MIME_TYPES: ${ALLOWED_SOURCE_FILE_MIME_TYPES:-text/csv,application/csv,application/vnd.ms-excel,text/plain,application/octet-stream}
      MAX_UPLOAD_SIZE_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-262144000}
      VALIDATION_VERSION: ${VALIDATION_VERSION:-1.0.0}
      DEFAULT_VALIDATION_RULE_SET: ${DEFAULT_VALIDATION_RULE_SET:-financial_data_quality_v1}
      VALIDATION_REPORT_ROOT: ${VALIDATION_REPORT_ROOT:-/data/generated/reports/validation}
      VALIDATION_MAX_ISSUES_PER_RULE: ${VALIDATION_MAX_ISSUES_PER_RULE:-5000}
      GENERATOR_VERSION: ${GENERATOR_VERSION:-1.0.0}
      GENERATION_RANDOM_SEED: ${GENERATION_RANDOM_SEED:-20260714}
      GENERATED_DATA_DIRECTORY: ${GENERATED_DATA_DIRECTORY:-/data/generated}
      GENERATED_CUSTOMER_COUNT: ${GENERATED_CUSTOMER_COUNT:-8}
      GENERATION_MIN_CUSTOMER_DEPOSIT: ${GENERATION_MIN_CUSTOMER_DEPOSIT:-0.01}
      MESSY_GENERATOR_VERSION: ${MESSY_GENERATOR_VERSION:-1.0.0}
      DEFAULT_DEFECT_SCENARIO: ${DEFAULT_DEFECT_SCENARIO:-standard_messy_v1}
      MESSY_GENERATION_RANDOM_SEED: ${MESSY_GENERATION_RANDOM_SEED:-20260714}
      MAX_DEFECTS_PER_RUN: ${MAX_DEFECTS_PER_RUN:-500}
      MAX_MUTATION_VALUE_LENGTH: ${MAX_MUTATION_VALUE_LENGTH:-500}
      MESSY_GENERATED_ROOT: ${MESSY_GENERATED_ROOT:-/data/generated/messy}
      MESSY_MANIFEST_ROOT: ${MESSY_MANIFEST_ROOT:-/data/generated/manifests/messy}
      MESSY_REPORT_ROOT: ${MESSY_REPORT_ROOT:-/data/generated/reports/messy}
      MESSY_DETERMINISM_VERIFICATION_ENABLED: ${MESSY_DETERMINISM_VERIFICATION_ENABLED:-true}
      SCENARIO_RULE_CONFLICT_POLICY: ${SCENARIO_RULE_CONFLICT_POLICY:-skip_later}
      PROFILING_VERSION: ${PROFILING_VERSION:-1.0.0}
      CSV_READ_CHUNK_SIZE: ${CSV_READ_CHUNK_SIZE:-1000}
      MAX_SAMPLED_VALUES_PER_COLUMN: ${MAX_SAMPLED_VALUES_PER_COLUMN:-5}
      NULL_PERCENTAGE_WARNING_THRESHOLD: ${NULL_PERCENTAGE_WARNING_THRESHOLD:-50}
      RUNNING_BALANCE_TOLERANCE: ${RUNNING_BALANCE_TOLERANCE:-0.01}
      SUPPORTED_ENCODINGS: ${SUPPORTED_ENCODINGS:-utf-8-sig,utf-8}
      MAX_PROFILING_ROW_COUNT: ${MAX_PROFILING_ROW_COUNT:-100000}
      ENABLE_DEMO_ACTOR_HEADERS: ${ENABLE_DEMO_ACTOR_HEADERS:-true}
      DEFAULT_DEMO_TENANT_CODE: ${DEFAULT_DEMO_TENANT_CODE:-demo_coffee_group}
      DEFAULT_DEMO_USER_EMAIL: ${DEFAULT_DEMO_USER_EMAIL:-analyst@demo.local}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/ready', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
      VITE_MAX_UPLOAD_SIZE_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-262144000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5173"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
  frontend_node_modules:
